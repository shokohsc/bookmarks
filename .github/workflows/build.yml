name: Build and Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - bookmarks.html
      - src/**
      - build.js
      - tagger.js
      - vite.config.js
      - index.html
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - uses: actions/download-artifact@v8.0.1
        with:
          name: index
          path: docs/index.json
      - run: npm run build
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/
      - uses: actions/upload-artifact@v7.0.1
        with:
          name: index
          path: docs/index.json
          overwrite: true
      - uses: actions/upload-artifact@v7.0.1
        with:
          name: failures
          path: docs/failures.json
          retention-days: 90
          overwrite: true

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
