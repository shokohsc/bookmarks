name: Build and Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/build.yml
      - bookmarks.txt
      - src/**
      - build.js
      - tagger.js
      - llm-tagger.js
      - vite.config.js
      - index.html
      - package.json
      - package-lock.json
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 24
          cache: npm
      - uses: actions/cache@v6
        id: npm-cache
        with:
          path: node_modules/
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-
      - run: npm ci
      - run: npm run test:coverage
      - uses: actions/upload-artifact@v7.0.1
        with:
          name: coverage
          path: coverage/
          retention-days: 90
          overwrite: true

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 24
          cache: npm
      - uses: actions/cache@v6
        id: npm-cache
        with:
          path: node_modules/
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-
      - run: npm ci
      - run: node stars.js ${{ github.repository_owner }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - run: cat stars.txt bookmarks.txt > urls.txt
      - uses: actions/cache@v6
        with:
          path: docs/index.json
          key: ${{ hashFiles('urls.txt') }}
      - run: ./generate_bookmarks.sh
      - run: npm run build
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs/

  build-llm:
    needs: test
    runs-on: [self-hosted, linux]
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 24
          cache: npm
      - uses: actions/cache@v6
        id: npm-cache
        with:
          path: node_modules/
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-
      - run: npm ci
      - run: node stars.js ${{ github.repository_owner }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - run: cat stars.txt bookmarks.txt > urls.txt
      - uses: actions/cache@v6
        with:
          path: docs/index.json
          key: ${{ hashFiles('urls.txt') }}
      - run: ./generate_bookmarks.sh
      - run: npm run build
        env:
          LLM_TAGGING: true
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs/
      - uses: actions/upload-artifact@v7.0.1
        with:
          name: failures
          path: docs/failures.json
          retention-days: 90
          overwrite: true

  deploy:
    needs: [build, build-llm]
    if: always()
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
